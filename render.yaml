services:
  - type: web
    name: fb-dashboard-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fb-dashboard-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FB_APP_ID
        sync: false
      - key: FB_APP_SECRET
        sync: false
      - key: REDIRECT_URI
        sync: false
      - key: FRONTEND_URL
        sync: false

databases:
  - name: fb-dashboard-db
    plan: free
